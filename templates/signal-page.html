<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>금 원유 실시간 가격</title>
</head>
<body>

<h1>금 / 원유 실시간 가격</h1>

<div id="gold"></div>
<div id="oil"></div>

<script>
async function load(){
let r = await fetch('https://gold-oil-signal.onrender.com/api/signals')
let d = await r.json()

document.getElementById("gold").innerHTML="금 가격 : "+d.gold
document.getElementById("oil").innerHTML="원유 가격 : "+d.oil
}

load()
setInterval(load,60000)
</script>

</body>
</html>
