<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ item.name }} 임베드</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #081734;
      color: #e5e7eb;
    }
    .wrap {
      max-width: 420px;
      margin: 0 auto;
      padding: 10px;
    }
    .card {
      background: #0a1837;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 22px rgba(0,0,0,.16);
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }
    .name {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .symbol {
      font-size: 14px;
      color: #b7c4dd;
    }
    .pill {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
    .bull { background: rgba(34,197,94,.16); color: #6ee7b7; }
    .bear { background: rgba(239,68,68,.16); color: #fda4af; }
    .neutral { background: rgba(148,163,184,.15); color: #dbe4f3; }
    .price {
      font-size: 34px;
      font-weight: 800;
      margin: 8px 0 4px;
    }
    .change {
      color: #dbe4f3;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .chartbox {
      margin: 10px 0 12px;
      background: #091226;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 8px;
    }
    .chartlabel {
      color: #a3b4d3;
      font-size: 12px;
      margin-bottom: 6px;
    }
    svg {
      width: 100%;
      height: 54px;
      display: block;
    }
    polyline {
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .analysis {
      font-size: 14px;
      line-height: 1.7;
      color: #eef3ff;
      margin-bottom: 10px;
    }
    .meta {
      color: #b7c4dd;
      font-size: 13px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div>
          <div class="name">{{ item.name }}</div>
          <div class="symbol">{{ item.symbol }}</div>
        </div>
        <div class="pill {{ item.badge }}">{{ item.signal }}</div>
      </div>

      <div class="price">{{ item.price }}</div>
      <div class="change">변동률: {{ item.change_pct }}%</div>

      <div class="chartbox">
        <div class="chartlabel">최근 24구간 차트</div>
        {% if item.sparkline %}
        <svg viewBox="0 0 220 56" class="{{ item.badge }}">
          <polyline points="{{ item.sparkline }}"></polyline>
        </svg>
        {% else %}
        <div class="meta">차트 데이터 없음</div>
        {% endif %}
      </div>

      <div class="analysis">{{ item.analysis }}</div>
      <div class="meta">
        전일 종가: {{ item.previous_close }}<br>
        통화: {{ item.currency }}
      </div>
    </div>
  </div>
</body>
</html>
