<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ item.name }} 임베드</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #081734;
      color: #e5e7eb;
      overflow: hidden;
    }

    .wrap {
      width: 100%;
      margin: 0;
      padding: 0;
    }

    .card {
      width: 100%;
      background: #0a1837;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 14px;
      box-shadow: 0 10px 22px rgba(0,0,0,.16);
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
    }

    .name {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 2px;
    }

    .symbol {
      font-size: 13px;
      color: #b7c4dd;
    }

    .pill {
      display: inline-block;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .bull { background: rgba(34,197,94,.16); color: #6ee7b7; }
    .bear { background: rgba(239,68,68,.16); color: #fda4af; }
    .neutral { background: rgba(148,163,184,.15); color: #dbe4f3; }

    .price {
      font-size: 30px;
      font-weight: 800;
      margin: 6px 0 2px;
      line-height: 1.1;
    }

    .change {
      color: #dbe4f3;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .chartbox {
      margin: 10px 0 12px;
      background: #091226;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 8px;
    }

    .chartlabel {
      color: #a3b4d3;
      font-size: 11px;
      margin-bottom: 6px;
    }

    .chart-inner {
      border-radius: 10px;
      overflow: hidden;
      background: rgba(255,255,255,.03);
    }

    svg {
      width: 100%;
      height: 58px;
      display: block;
    }

    .chart-bg-bull {
      fill: rgba(16, 185, 129, 0.14);
    }

    .chart-bg-bear {
      fill: rgba(244, 114, 182, 0.12);
    }

    .chart-bg-neutral {
      fill: rgba(148, 163, 184, 0.12);
    }

    polyline {
      fill: none;
      stroke: currentColor;
      stroke-width: 2.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .analysis {
      font-size: 13px;
      line-height: 1.6;
      color: #eef3ff;
      margin-bottom: 8px;
    }

    .meta {
      color: #b7c4dd;
      font-size: 12px;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div>
          <div class="name">{{ item.name }}</div>
          <div class="symbol">{{ item.symbol }}</div>
        </div>
        <div class="pill {{ item.badge }}">{{ item.signal }}</div>
      </div>

      <div class="price">{{ item.price }}</div>
      <div class="change">변동률: {{ item.change_pct }}%</div>

      <div class="chartbox">
        <div class="chartlabel">최근 24구간 차트</div>
        <div class="chart-inner">
          {% if item.sparkline %}
          <svg viewBox="0 0 220 56" preserveAspectRatio="none" class="{{ item.badge }}">
            {% if item.badge == 'bull' %}
              <rect x="0" y="0" width="220" height="56" class="chart-bg-bull"></rect>
            {% elif item.badge == 'bear' %}
              <rect x="0" y="0" width="220" height="56" class="chart-bg-bear"></rect>
            {% else %}
              <rect x="0" y="0" width="220" height="56" class="chart-bg-neutral"></rect>
            {% endif %}
            <polyline points="{{ item.sparkline }}"></polyline>
          </svg>
          {% else %}
          <div class="meta" style="padding:12px;">차트 데이터 없음</div>
          {% endif %}
        </div>
      </div>

      <div class="analysis">{{ item.analysis }}</div>
      <div class="meta">
        전일 종가: {{ item.previous_close }}<br>
        통화: {{ item.currency }}
      </div>
    </div>
  </div>
</body>
</html>
